<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理测试</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>
<body class="bg-gray-50 flex h-screen">
    <aside class="w-20 bg-white p-4 flex flex-col items-center justify-between border-r">
        <div class="flex flex-col items-center space-y-6">
            <button class="p-2 rounded-lg hover:bg-gray-100">
                <span class="material-icons text-gray-600">menu</span>
            </button>
            <button id="chatButton" class="p-2 rounded-lg hover:bg-gray-100">
                <span class="material-icons text-gray-600">chat_bubble_outline</span>
            </button>
            <button id="brushButton" class="p-2 rounded-lg bg-purple-100 text-purple-600">
                <span class="material-icons">storage</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-semibold text-gray-800">知识库管理</h1>
        </header>

        <!-- 聊天框区域 -->
        <div id="chatSection" class="bg-white rounded-xl shadow-sm mb-8" style="min-height: 400px;">
            <div id="chatBubbleApp" class="p-6" style="min-height: 300px; background-color: #f3f4f6;">
                <div class="flex items-center justify-center h-full text-gray-500">
                    <div class="text-center">
                        <div class="text-4xl mb-4">💬</div>
                        <p>开始与AI助手对话</p>
                    </div>
                </div>
            </div>
            
            <div id="senderApp" class="p-4 border-t" style="background-color: #f9fafb; min-height: 80px;">
                <div class="flex items-end space-x-4">
                    <div class="flex-1">
                        <textarea
                            placeholder="输入您的问题..."
                            class="w-full p-3 border border-gray-300 rounded-lg resize-y focus:ring-2 focus:ring-purple-500 focus:border-transparent min-h-[80px] max-h-[400px]"
                            rows="3"
                        ></textarea>
                    </div>
                    <button class="px-6 py-3 bg-purple-500 text-white rounded-lg hover:bg-purple-600 flex items-center space-x-2">
                        <span class="material-icons">send</span>
                        <span>发送</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 知识库网格区域 -->
        <div id="knowledgeBaseSection" class="bg-white rounded-xl shadow-sm p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold text-gray-700">我的知识库</h2>
                <button id="createKnowledgeBaseBtn" class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 flex items-center gap-2">
                    <span class="material-icons text-sm">add</span>
                    新建知识库
                </button>
            </div>

            <div id="knowledgeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- 知识库卡片 -->
                <div class="knowledge-card border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow cursor-pointer bg-blue-100">
                    <div class="flex items-start justify-between mb-4">
                        <div class="text-2xl">📝</div>
                        <div class="flex space-x-2">
                            <button class="p-1 rounded hover:bg-gray-200 text-gray-400 hover:text-gray-600">
                                <span class="material-icons text-sm">more_vert</span>
                            </button>
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-medium text-gray-800 mb-2 truncate">金融知识库</h3>
                    <p class="text-sm text-gray-600 mb-4">学习金融过程中的知识库</p>
                    
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <span>4 项内容</span>
                        <span>知识库</span>
                    </div>
                </div>

                <div class="knowledge-card border border-gray-200 rounded-lg p-6 hover:shadow-md transition-shadow cursor-pointer bg-green-100">
                    <div class="flex items-start justify-between mb-4">
                        <div class="text-2xl">📚</div>
                        <div class="flex space-x-2">
                            <button class="p-1 rounded hover:bg-gray-200 text-gray-400 hover:text-gray-600">
                                <span class="material-icons text-sm">more_vert</span>
                            </button>
                        </div>
                    </div>
                    
                    <h3 class="text-lg font-medium text-gray-800 mb-2 truncate">法律知识库</h3>
                    <p class="text-sm text-gray-600 mb-4">法律相关资料</p>
                    
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <span>3 项内容</span>
                        <span>知识库</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        console.log('测试页面加载完成');
        
        // 简单的按钮点击测试
        document.getElementById('createKnowledgeBaseBtn').addEventListener('click', () => {
            alert('新建知识库按钮点击测试');
        });
    </script>
</body>
</html>
