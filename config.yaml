model_chat_url: "http://120.46.208.202:8030"
# model_chat_url: "http://127.0.0.1:12356"

# 知识图谱可视化配置
knowledge_graph:
  # 节点配置
  nodes:
    # 文档节点
    document:
      color: "#8b5cf6"  # 紫色
      size: 20
      stroke_color: "#6d28d9"
      stroke_width: 2
    # 标签节点
    tag:
      color: "#10b981"  # 绿色
      size: 15
      stroke_color: "#059669"
      stroke_width: 1.5
  # 连线配置
  links:
    color: "#d1d5db"  # 灰色
    width: 2
    opacity: 0.6
  # 布局配置
  layout:
    force_strength: -300
    link_distance: 100
    center_force: 0.1
  # 交互配置
  interaction:
    hover_opacity: 0.8
    selected_opacity: 1.0
    unselected_opacity: 0.3

# 文件上传配置
file_upload:
  image_extensions:
    - "jpg"
    - "jpeg"
    - "png"
    - "gif"
    - "bmp"
    - "webp"
    - "svg"

# 快捷提示词按钮配置
prompt_buttons:
  思维导图: "请用思维导图的方式回答下面的问题"
  邮件: "请以邮件格式整理并发送以下内容"
  代码执行: "请分析并给出可执行代码示例"
  每日新闻: "请以今日新闻播报的形式回答"
  测试: "请以测试的形式回答"

# DeepResearch 单独提示词
deep_research_prompt: "请对下面的主题进行深入研究，并给出详尽的参考资料，需要使用链式思考，并给出详细的推理过程以确保信息的准确性"