    <div class="mt-8 bg-white p-6 rounded-xl shadow-sm">

        <!-- 聊天消息显示区域 -->
        <div class="border border-gray-200 rounded-lg p-4 h-64 overflow-y-auto mb-4 bg-gray-50">
            <div class="text-center text-gray-500 mt-20">
                在所有平台实时互通使用智达AI助手
            </div>
        </div>

        <!-- 聊天输入表单 -->
        <form action="/api/chat" method="post" class="space-y-4">
            <!-- 工具栏 -->
            <div class="flex items-center space-x-2 overflow-x-auto whitespace-nowrap border-b border-gray-200 pb-2">
                <button type="button" class="px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 flex items-center">
                    <span class="material-icons text-sm mr-1">auto_awesome</span> 翻译
                </button>
                <button type="button" class="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100 flex items-center">
                    <span class="material-icons text-sm mr-1">article</span> 日常
                </button>
                <button type="button" class="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100 flex items-center">
                    <span class="material-icons text-sm mr-1">school</span> 思维导图
                </button>
                <button type="button" class="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100 flex items-center">
                    <span class="material-icons text-sm mr-1">search</span> 搜索
                </button>
            </div>

            <!-- 输入区域 -->
            <div class="border border-gray-200 rounded-lg bg-white shadow-sm">
                <textarea
                    name="message"
                    placeholder="先帮我写一篇关于人工智能的演讲稿，再做成思维导图"
                    class="w-full p-3 border-none resize-y focus:ring-0 text-gray-700 placeholder-gray-400 text-base rounded-lg min-h-[80px] max-h-[400px]"
                    rows="3"
                    required
                ></textarea>
                <div class="flex items-center justify-between p-3 border-t border-gray-100">
                    <div class="flex items-center space-x-2">
                        <button type="button" class="p-1.5 rounded-md hover:bg-gray-100">
                            <span class="material-icons text-gray-500 text-xl">mic_none</span>
                        </button>
                        <button type="button" class="p-1.5 rounded-md hover:bg-gray-100">
                            <span class="material-icons text-gray-500 text-xl">attach_file</span>
                        </button>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button type="submit" class="px-4 py-2 bg-purple-500 text-white rounded-lg hover:bg-purple-600 flex items-center">
                            <span class="material-icons text-sm mr-1">send</span>
                            发送
                        </button>
                    </div>
                </div>
            </div>

            <!-- 底部工具栏 -->
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <select name="model" class="flex items-center px-3 py-1.5 text-sm bg-purple-50 text-purple-700 rounded-lg border-none">
                        <option value="sonnet">Sonnet</option>
                        <option value="gpt4">GPT-4</option>
                        <option value="claude">Claude</option>
                    </select>
                    <select name="search_type" class="flex items-center px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded-lg border-none">
                        <option value="web">全网</option>
                        <option value="local">本地</option>
                    </select>
                </div>
            </div>
        </form>
