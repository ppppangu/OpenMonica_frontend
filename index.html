<script>
// 检查依赖是否加载
if (typeof Vue === 'undefined') {
    console.error('Vue 未加载');
} else {
    console.log('Vue 已加载');
}

const { createApp, ref, watch } = Vue;

const SenderApp = {
    setup() {
        const value = ref('');
        const loading = ref(false);
        const mindMapActive = ref(false);
        const flashActive = ref(false);

        // 监听输入变化，更新全局变量
        watch(value, (newValue) => {
            if (window.globalData) {
                window.globalData.userInput = newValue.trim() ? [{"role": "user", "content": newValue.trim()}] : [];
                console.log('用户输入:', window.globalData.userInput);

                // 更新字数统计
                const wordcount = newValue.length;
                const wordcountElement = document.getElementById('wordcount');
                if (wordcountElement) {
                    wordcountElement.textContent = wordcount || '';
                }
            }
        });

        // 发送消息处理
        const handleSubmit = async () => {
            if (!value.value.trim()) {
                console.log('用户输入为空，请先输入');
                return;
            }

            loading.value = true;

            try {
                // 调用现有的发送消息逻辑
                if (typeof sendMessage === 'function') {
                    await sendMessage();
                    value.value = ''; // 清空输入
                } else {
                    console.error('sendMessage 函数未找到');
                }
            } catch (error) {
                console.error('发送消息失败:', error);
            } finally {
                loading.value = false;
            }
        };

        // 取消发送处理
        const handleCancel = () => {
            loading.value = false;
            console.log('取消发送');
        };

        // 思维导图按钮处理
        const handleMindMap = async () => {
            if (mindMapActive.value) {
                // 取消思维导图
                mindMapActive.value = false;
                if (window.globalData) {
                    window.globalData.extra_messages = window.globalData.extra_messages.filter(item => item.prompt_id !== 'mindmap_prompt');
                    console.log('删除思维导图，当前extra_messages:', window.globalData.extra_messages);
                }
            } else {
                // 激活思维导图
                mindMapActive.value = true;
                const requestBody = {
                    prompt_id: 'mindmap_prompt',
                    parameters: {}
                };
                if (window.globalData && !window.globalData.extra_messages.some(item => item.prompt_id === 'mindmap_prompt')) {
                    try {
                        const response = await axios.post('/api/prompt/get', requestBody);
                        if (response.data.content) {
                            window.globalData.extra_messages.push({ "prompt_id": "mindmap_prompt", "content": response.data.content});
                            console.log('添加思维导图，当前extra_messages:', window.globalData.extra_messages);
                        }
                    } catch (error) {
                        console.error('获取思维导图提示词失败:', error);
                        mindMapActive.value = false;
                    }
                }
            }
        };

        // 闪电按钮处理
        const handleFlash = () => {
            flashActive.value = !flashActive.value;
            if (window.globalData) {
                window.globalData.iscompletion = flashActive.value;
                console.log('闪电按钮状态:', flashActive.value, 'iscompletion:', window.globalData.iscompletion);
            }
        };

        return {
            value,
            loading,
            mindMapActive,
            flashActive,
            handleSubmit,
            handleCancel,
            handleMindMap,
            handleFlash
        };
    },
    template: `
        <div>
            <!-- 工具栏区域 -->
            <div class="p-4 border-b border-gray-200 flex items-center space-x-2 overflow-x-auto whitespace-nowrap">
                <button class="px-3 py-1.5 text-sm rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 flex items-center">
                    <span class="material-icons text-sm mr-1">auto_awesome</span> 翻译
                </button>
                <button class="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100 flex items-center">
                    <span class="material-icons text-sm mr-1">article</span> 日常
                </button>
                <button
                    @click="handleMindMap"
                    :class="[
                        'px-3 py-1.5 text-sm rounded-lg flex items-center transition-colors',
                        mindMapActive
                            ? 'bg-purple-50 text-purple-700'
                            : 'text-gray-600 hover:bg-gray-100'
                    ]"
                >
                    <span class="material-icons text-sm mr-1">school</span> 思维导图
                </button>
                <button class="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100 flex items-center">
                    <span class="material-icons text-sm mr-1">anchor</span> Mermaid
                </button>
                <button class="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100 flex items-center">
                    <span class="material-icons text-sm mr-1">search</span> 搜索
                </button>
                <button class="px-3 py-1.5 text-sm rounded-lg text-gray-600 hover:bg-gray-100 flex items-center">
                    <span class="material-icons text-sm mr-1">apps</span> 全部
                </button>
            </div>

            <!-- 模型信息栏 -->
            <div class="p-4 flex items-center space-x-3 border-b border-gray-200">
                <img alt="Monica logo" class="w-6 h-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwnUaAUWDqHBOEtuU0LNEFwpRyfSDBpGaOhc5ciqojojdAy5yf_ms-ltb8ShhzEJbIiC8O23-_2Kw4b6ibw1kbhjpTk7rSUgnCJKlxQAcCCS1q3M_QDqnaHvL_fvkXw5EqDWhI_bo9VMVrzgmgTwoS2DtWYtd7uB1Y2f4dpq4OlxJD-MDPjIM8j7-F_WLR6W-Yo5o7TZ4mA3nhWHCyXX2OpIwo4TBH-1DfKyOaRQ-AmyhCwSDZrZDWYTGXyDMSTJxbwwfXoQWzaLw"/>
                <span class="text-sm font-medium text-gray-700">Monica</span>
                <span class="material-icons text-gray-400 text-lg">tune</span>
                <span class="material-icons text-gray-400 text-lg">push_pin</span>

                <button class="p-1.5 rounded-md hover:bg-gray-100">
                    <span class="material-icons text-gray-500 text-xl">history</span>
                </button>
                <button class="p-1.5 rounded-md hover:bg-gray-100">
                    <span class="material-icons text-gray-500 text-xl">palette</span>
                </button>
            </div>

            <!-- 输入区域 - 使用 Ant Design X Vue Sender 组件样式 -->
            <div class="p-4 relative">
                <div class="border border-gray-200 rounded-lg bg-white shadow-sm">
                    <textarea
                        v-model="value"
                        :disabled="loading"
                        placeholder="先帮我写一篇关于人工智能的演讲稿，再做成思维导图"
                        class="w-full p-3 border-none resize-none focus:ring-0 text-gray-700 placeholder-gray-400 text-base rounded-lg"
                        rows="3"
                        @keydown.enter.ctrl="handleSubmit"
                        @keydown.enter.meta="handleSubmit"
                    ></textarea>
                    <div class="flex items-center justify-between p-3 border-t border-gray-100">
                        <div class="flex items-center space-x-2">
                            <button class="p-1.5 rounded-md hover:bg-gray-100">
                                <span class="material-icons text-gray-500 text-xl">mic_none</span>
                            </button>
                            <button class="p-1.5 rounded-md hover:bg-gray-100">
                                <span class="material-icons text-gray-500 text-xl">attach_file</span>
                            </button>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="text-xs text-gray-400">{{ value.length }}</span>
                            <button
                                v-if="loading"
                                @click="handleCancel"
                                class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 flex items-center"
                            >
                                <span class="material-icons text-sm mr-1">stop</span>
                                取消
                            </button>
                            <button
                                v-else
                                @click="handleSubmit"
                                :disabled="!value.trim()"
                                :class="[
                                    'px-4 py-2 rounded-lg flex items-center transition-colors',
                                    value.trim()
                                        ? 'bg-purple-500 text-white hover:bg-purple-600'
                                        : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                                ]"
                            >
                                <span class="material-icons text-sm mr-1">send</span>
                                发送
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部工具栏 -->
            <div class="px-4 py-3 border-t border-gray-200 flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="relative">
                        <button id="modelSelector" class="flex items-center px-3 py-1.5 text-sm bg-purple-50 text-purple-700 rounded-lg hover:bg-purple-100">
                            <span class="material-icons text-sm mr-1">flare</span>
                            <span id="selectedModel">Sonnet</span>
                            <span class="material-icons text-sm ml-1">expand_less</span>
                        </button>
                        <div id="modelDropdown" class="absolute bottom-full left-0 mb-1 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-50 hidden">
                            <div class="p-2">
                                <div class="text-xs text-gray-500 mb-2">选择模型</div>
                                <div id="modelList" class="space-y-1">
                                    <div class="flex items-center justify-center py-4">
                                        <span class="text-sm text-gray-400">加载中...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="flex items-center px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                        <span class="material-icons text-sm mr-1">public</span> 全网
                        <span class="material-icons text-sm ml-1">expand_more</span>
                    </button>

                    <!-- 通知偏好多选框 -->
                    <div class="relative">
                        <button id="notificationSelector" class="flex items-center px-3 py-1.5 text-sm bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                            <span class="material-icons text-sm mr-1">notifications</span>
                            <span id="selectedNotifications">邮件通知</span>
                            <span class="material-icons text-sm ml-1">expand_more</span>
                        </button>
                        <div id="notificationDropdown" class="absolute bottom-full left-0 mb-1 w-40 bg-white border border-gray-200 rounded-lg shadow-lg z-50 hidden">
                            <div class="p-2">
                                <div class="text-xs text-gray-500 mb-2">通知偏好</div>
                                <div class="space-y-2">
                                    <label class="flex items-center cursor-pointer">
                                        <input type="checkbox" id="emailNotification" class="mr-2 text-purple-600 focus:ring-purple-500" checked>
                                        <span class="text-sm text-gray-700">邮件通知</span>
                                    </label>
                                    <label class="flex items-center cursor-pointer">
                                        <input type="checkbox" id="smsNotification" class="mr-2 text-purple-600 focus:ring-purple-500">
                                        <span class="text-sm text-gray-700">短信通知</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <span id="wordcount" class="text-xs text-gray-400"></span>
                </div>
            </div>
        </div>
    `
};

// 等待页面加载完成后初始化Vue应用
document.addEventListener('DOMContentLoaded', () => {
    // 延迟初始化Vue应用，确保其他脚本先执行
    setTimeout(() => {
        try {
            const app = createApp(SenderApp);
            app.mount('#senderApp');
            console.log('Vue Sender App 已初始化');
        } catch (error) {
            console.error('Vue应用初始化失败:', error);
        }
    }, 500);
});
</script>

</body></html>
