<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无限循环修复测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .status-card {
            margin-bottom: 20px;
            padding: 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            background: #f8f9fa;
        }
        .status-good {
            border-color: #28a745;
            background: #d4edda;
        }
        .status-bad {
            border-color: #dc3545;
            background: #f8d7da;
        }
        .test-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .nav-links {
            text-align: center;
            margin-top: 30px;
        }
        .nav-link {
            display: inline-block;
            margin: 0 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        .nav-link:hover {
            text-decoration: none;
            color: white;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 无限循环修复测试</h1>
            <p>检查 React 无限循环问题是否已解决</p>
        </div>

        <!-- 状态检查 -->
        <div class="status-card" id="status-card">
            <h3>📊 当前状态</h3>
            <p id="status-text">正在检查...</p>
            <button class="test-button" onclick="checkStatus()">刷新状态</button>
            <button class="test-button" onclick="clearConsole()">清空控制台</button>
        </div>

        <!-- 错误监控 -->
        <div class="status-card">
            <h3>🚨 错误监控</h3>
            <p>监控 React 错误和无限循环</p>
            <button class="test-button" onclick="startErrorMonitoring()">开始监控</button>
            <button class="test-button" onclick="stopErrorMonitoring()">停止监控</button>
            <div id="error-count">错误计数: 0</div>
        </div>

        <!-- 控制台输出 -->
        <div class="status-card">
            <h3>🖥️ 控制台输出</h3>
            <div id="console-output" class="console-output">等待控制台输出...</div>
        </div>

        <div class="nav-links">
            <a href="http://localhost:5174/chat" class="nav-link">💬 Chat 页面</a>
            <a href="http://localhost:5174/login" class="nav-link">🔐 登录页面</a>
            <a href="http://localhost:5174/" class="nav-link">🏠 主页</a>
        </div>
    </div>

    <script>
        let errorCount = 0;
        let isMonitoring = false;
        let consoleOutput = document.getElementById('console-output');
        let originalConsole = {
            log: console.log,
            error: console.error,
            warn: console.warn
        };

        // 拦截控制台输出
        function interceptConsole() {
            ['log', 'error', 'warn'].forEach(method => {
                console[method] = function(...args) {
                    originalConsole[method].apply(console, args);
                    const timestamp = new Date().toLocaleTimeString();
                    const message = args.map(arg => 
                        typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                    ).join(' ');
                    consoleOutput.textContent += `[${timestamp}] ${method.toUpperCase()}: ${message}\n`;
                    consoleOutput.scrollTop = consoleOutput.scrollHeight;
                    
                    // 检查是否是无限循环相关的错误
                    if (method === 'error' && message.includes('Maximum update depth exceeded')) {
                        errorCount++;
                        updateErrorCount();
                        updateStatus('bad', '❌ 检测到无限循环错误！');
                    }
                };
            });
        }

        // 监控 React 错误
        function startErrorMonitoring() {
            if (isMonitoring) return;
            
            isMonitoring = true;
            errorCount = 0;
            updateErrorCount();
            
            // 监听全局错误
            window.addEventListener('error', handleError);
            window.addEventListener('unhandledrejection', handlePromiseRejection);
            
            console.log('开始监控 React 错误...');
            updateStatus('good', '✅ 错误监控已启动');
        }

        function stopErrorMonitoring() {
            if (!isMonitoring) return;
            
            isMonitoring = false;
            
            window.removeEventListener('error', handleError);
            window.removeEventListener('unhandledrejection', handlePromiseRejection);
            
            console.log('停止监控 React 错误');
            updateStatus('good', '⏹️ 错误监控已停止');
        }

        function handleError(event) {
            errorCount++;
            updateErrorCount();
            console.error('全局错误:', event.error);
            
            if (event.error && event.error.message && 
                event.error.message.includes('Maximum update depth exceeded')) {
                updateStatus('bad', '❌ 检测到 React 无限循环！');
            }
        }

        function handlePromiseRejection(event) {
            errorCount++;
            updateErrorCount();
            console.error('Promise 拒绝:', event.reason);
        }

        function updateErrorCount() {
            document.getElementById('error-count').textContent = `错误计数: ${errorCount}`;
        }

        function updateStatus(type, message) {
            const statusCard = document.getElementById('status-card');
            const statusText = document.getElementById('status-text');
            
            statusCard.className = `status-card status-${type}`;
            statusText.textContent = message;
        }

        function checkStatus() {
            const now = new Date().toLocaleTimeString();
            
            // 检查页面是否正常运行
            try {
                // 检查 localStorage
                const authData = localStorage.getItem('auth-storage');
                const hasAuth = !!authData;
                
                // 检查当前页面
                const currentPage = window.location.href;
                
                let status = `状态检查 (${now}):\n`;
                status += `- 页面正常运行: ✅\n`;
                status += `- 认证数据: ${hasAuth ? '✅ 存在' : '❌ 不存在'}\n`;
                status += `- 当前页面: ${currentPage}\n`;
                status += `- 错误计数: ${errorCount}\n`;
                
                if (errorCount === 0) {
                    updateStatus('good', '✅ 系统运行正常，无错误检测到');
                } else {
                    updateStatus('bad', `⚠️ 检测到 ${errorCount} 个错误`);
                }
                
                console.log(status);
                
            } catch (error) {
                updateStatus('bad', '❌ 状态检查失败: ' + error.message);
                console.error('状态检查失败:', error);
            }
        }

        function clearConsole() {
            consoleOutput.textContent = '控制台已清空...\n';
            console.clear();
        }

        // 页面加载时初始化
        window.addEventListener('load', () => {
            interceptConsole();
            startErrorMonitoring();
            
            setTimeout(() => {
                checkStatus();
            }, 2000);
            
            // 定期检查状态
            setInterval(() => {
                if (isMonitoring) {
                    const now = new Date().toLocaleTimeString();
                    if (errorCount === 0) {
                        updateStatus('good', `✅ 系统正常运行 (${now})`);
                    }
                }
            }, 10000); // 每10秒检查一次
        });

        console.log('无限循环修复测试工具已启动');
    </script>
</body>
</html>
