<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>智达AI - 登录注册</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .form-container {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .input-group {
            position: relative;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.8);
            color: #667eea;
        }

        .input-group label {
            position: absolute;
            left: 0.75rem;
            top: 0.75rem;
            transition: all 0.2s ease;
            pointer-events: none;
            color: #9ca3af;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .error-message {
            display: none;
        }

        .success-message {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="form-container w-full max-w-md p-8 rounded-2xl shadow-2xl">
        <!-- Logo和标题 -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="material-icons text-white text-2xl">smart_toy</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">智达AI助手</h1>
            <p class="text-gray-600 mt-2">欢迎使用智能对话平台</p>
        </div>

        <!-- 标签页切换 -->
        <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
            <button id="loginTab" class="tab-button flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all active">
                登录
            </button>
            <button id="registerTab" class="tab-button flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all text-gray-600">
                注册
            </button>
        </div>

        <!-- 消息提示 -->
        <div id="errorMessage" class="error-message bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
            <div class="flex items-center">
                <span class="material-icons text-sm mr-2">error</span>
                <span id="errorText"></span>
            </div>
        </div>

        <div id="successMessage" class="success-message bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4">
            <div class="flex items-center">
                <span class="material-icons text-sm mr-2">check_circle</span>
                <span id="successText"></span>
            </div>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="space-y-6">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder=" " required
                       class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-colors">
                <label for="loginEmail">邮箱地址</label>
            </div>

            <div class="input-group">
                <input type="password" id="loginPassword" placeholder=" " required
                       class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-colors">
                <label for="loginPassword">密码</label>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" class="mr-2 text-purple-600 focus:ring-purple-500">
                    <span class="text-sm text-gray-600">记住我</span>
                </label>
                <a href="#" class="text-sm text-purple-600 hover:text-purple-800">忘记密码？</a>
            </div>

            <button type="submit" class="btn-primary w-full py-3 text-white font-medium rounded-lg">
                登录
            </button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="space-y-6 hidden">
            <div class="input-group">
                <input type="text" id="registerUsername" placeholder=" " required
                       class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-colors">
                <label for="registerUsername">用户名</label>
            </div>

            <div class="input-group">
                <input type="email" id="registerEmail" placeholder=" " required
                       class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-colors">
                <label for="registerEmail">邮箱地址</label>
            </div>

            <div class="input-group">
                <input type="password" id="registerPassword" placeholder=" " required
                       class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-colors">
                <label for="registerPassword">密码</label>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder=" " required
                       class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-colors">
                <label for="confirmPassword">确认密码</label>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="agreeTerms" required class="mr-2 text-purple-600 focus:ring-purple-500">
                <label for="agreeTerms" class="text-sm text-gray-600">
                    我同意 <a href="#" class="text-purple-600 hover:text-purple-800">服务条款</a> 和 <a href="#" class="text-purple-600 hover:text-purple-800">隐私政策</a>
                </label>
            </div>

            <button type="submit" class="btn-primary w-full py-3 text-white font-medium rounded-lg">
                注册
            </button>
        </form>

        <!-- 返回首页链接 -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-sm text-gray-600 hover:text-purple-600 flex items-center justify-center">
                <span class="material-icons text-sm mr-1">arrow_back</span>
                返回首页
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./public/js/common.js"></script>
    <script src="./public/js/session-manager.js"></script>
    <script src="./public/js/auth.js"></script>
</body>
</html>
