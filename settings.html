<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gray-100 h-screen">
<!-- 第一容器：固定侧边栏 -->
<div id="container-sidebar" class="container-sidebar">
    <div class="sidebar-content">
        <div class="sidebar-nav-top">
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">menu</span>
            </button>
            <a href="index.html" class="sidebar-nav-item">
                <span class="material-icons text-gray-600">chat_bubble_outline</span>
            </a>
            <a href="knowledgebase.html" class="sidebar-nav-item">
                <span class="material-icons text-gray-600">storage</span>
            </a>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">videocam</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">mic</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">explore</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">bookmark_border</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">more_horiz</span>
            </button>
        </div>
        <div class="sidebar-nav-bottom">
            <a href="help.html" class="sidebar-nav-item">
                <span class="material-icons text-gray-600">help_outline</span>
            </a>
            <button class="sidebar-nav-item sidebar-nav-active">
                <span class="material-icons">settings</span>
            </button>
            <a href="home.html" class="sidebar-user-avatar">
                M
            </a>
        </div>
    </div>
</div>

<!-- 第二容器：顶部容器 -->
<div id="container-settings-header" class="container-settings-header">
    <div class="settings-header-content">
        <div class="settings-header-left">
            <h1 class="settings-page-title">设置</h1>
        </div>
        <div class="settings-header-right">
            <div class="settings-auto-save-info">
                <span class="material-icons">info_outline</span>
                <span>更改将自动保存</span>
            </div>
        </div>
    </div>
</div>

<!-- 设置内容布局容器 -->
<div id="container-settings-layout" class="container-settings-layout">

    <!-- 第三容器：用户提示设置区域 -->
    <div id="container-user-prompt" class="container-user-prompt">
        <div class="settings-section-header">
            <div class="settings-section-title-group">
                <h2 class="settings-section-title">个性化</h2>
                <div id="userPromptAutoSaveIndicator" class="auto-save-indicator"></div>
            </div>
        </div>
        <div class="settings-section-content">
            <p class="settings-section-description">
                设置您的个人偏好和背景信息，以获得更个性化的AI回答。修改后会在3秒内自动保存。
            </p>
            <form action="/api/settings/user-prompt" method="post" class="settings-form">
                <textarea
                    name="user_prompt"
                    class="settings-textarea settings-textarea-purple"
                    placeholder="你来自哪里？&#10;你的兴趣和爱好是什么？&#10;你是做什么的？AI应该如何称呼您？&#10;AI应该使用什么语气与您交流？&#10;AI的回复应该有多长？"
                ></textarea>
            </form>
        </div>
    </div>

    <!-- 第四容器：模型记忆设置区域 -->
    <div id="container-model-memory" class="container-model-memory">
        <div class="settings-section-header">
            <div class="settings-section-title-group">
                <h2 class="settings-section-title">模型记忆</h2>
                <div id="modelMemoryAutoSaveIndicator" class="auto-save-indicator"></div>
            </div>
        </div>
        <div class="settings-section-content">
            <p class="settings-section-description">
                AI对您的了解和记忆，这些信息将帮助AI更好地理解您的需求。修改后会在3秒内自动保存。
            </p>
            <form action="/api/settings/model-memory" method="post" class="settings-form">
                <textarea
                    name="model_memory"
                    class="settings-textarea settings-textarea-blue"
                    placeholder="AI将在这里记录对您的了解..."
                ></textarea>
            </form>
        </div>
    </div>

    <!-- 第五容器：通用设置区域 -->
    <div id="container-general-settings" class="container-general-settings">
        <div class="settings-section-header">
            <div class="settings-section-title-group">
                <h2 class="settings-section-title">通用设置</h2>
            </div>
        </div>
        <div class="settings-section-content">
            <p class="settings-section-description">
                界面和交互设置，个性化您的使用体验。
            </p>
            <form action="/api/settings/general" method="post" class="settings-form settings-form-general">
                <div class="settings-group">
                    <h3 class="settings-group-title">主题设置</h3>
                    <div class="settings-radio-group">
                        <label class="settings-radio-item">
                            <input type="radio" name="theme" value="light" class="settings-radio" checked>
                            <span class="settings-radio-label">浅色主题</span>
                        </label>
                        <label class="settings-radio-item">
                            <input type="radio" name="theme" value="dark" class="settings-radio">
                            <span class="settings-radio-label">深色主题</span>
                        </label>
                        <label class="settings-radio-item">
                            <input type="radio" name="theme" value="auto" class="settings-radio">
                            <span class="settings-radio-label">跟随系统</span>
                        </label>
                    </div>
                </div>

                <div class="settings-group">
                    <h3 class="settings-group-title">语言设置</h3>
                    <select name="language" class="settings-select">
                        <option value="zh-CN">简体中文</option>
                        <option value="en-US">English</option>
                        <option value="ja-JP">日本語</option>
                    </select>
                </div>

                <div class="settings-group">
                    <h3 class="settings-group-title">通知设置</h3>
                    <div class="settings-checkbox-group">
                        <label class="settings-checkbox-item">
                            <input type="checkbox" name="notifications[]" value="desktop" class="settings-checkbox" checked>
                            <span class="settings-checkbox-label">桌面通知</span>
                        </label>
                        <label class="settings-checkbox-item">
                            <input type="checkbox" name="notifications[]" value="sound" class="settings-checkbox">
                            <span class="settings-checkbox-label">声音提醒</span>
                        </label>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
