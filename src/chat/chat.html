<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AI Chat Interface</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="./style.css" rel="stylesheet"/>
</head>
<body class="bg-gray-50 h-screen">
<!-- 全局控制器 -->
<input type="checkbox" id="chat-panel-toggle" class="hidden" checked>

<!-- 第一容器：固定侧边栏 -->
<div id="container-sidebar" class="container-sidebar">
    <div class="sidebar-content">
        <div class="sidebar-nav-top">
            <div class="sidebar-nav-item">
                <span class="material-icons text-gray-600">menu</span>
            </div>
            <label for="chat-panel-toggle" class="sidebar-nav-item sidebar-nav-active">
                <span class="material-icons">chat_bubble_outline</span>
            </label>
            <a href="/src/knowledgebase/knowledgebase.html" class="sidebar-nav-item">
                <span class="material-icons text-gray-600">storage</span>
            </a>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">videocam</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">mic</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">explore</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">bookmark_border</span>
            </button>
            <button class="sidebar-nav-item">
                <span class="material-icons text-gray-600">more_horiz</span>
            </button>
        </div>
        <div class="sidebar-nav-bottom">
            <a href="/src/help/help.html" class="sidebar-nav-item">
                <span class="material-icons text-gray-600">help_outline</span>
            </a>
            <a href="/src/settings/settings.html" class="sidebar-nav-item">
                <span class="material-icons text-gray-600">settings</span>
            </a>
            <a href="/src/home/home.html" class="sidebar-user-avatar">
                M
            </a>
        </div>
    </div>
</div>

<!-- 第二容器：聊天记录面板 -->
<div id="container-chat-history" class="container-chat-history">
    <div id="user-info"></div>
    <div class="chat-history-header">
        <h3 class="chat-history-title">聊天记录</h3>
    </div>
    <div class="chat-history-content">
        <!-- 聊天列表 -->
        <div id="chatlist"></div>
    </div>
</div>

<!-- 第三容器：主内容区域 -->
<div id="container-main-content" class="container-main-content">
    <div class="main-content-wrapper">
        <!-- 主内容头部 -->
        <div id="hello" class="main-content-header"></div>

        <!-- 聊天区域容器 - 使用flexbox布局 -->
        <div class="chat-area-container">
            <!-- AI 聊天显示区域模块 - 现在包含实时流式响应 -->
            <div id="chatbox" class="chat-messages-container"></div>
        </div>

        <!-- 聊天输入框 - 现在作为内容流的一部分 -->
        <div id="container-chat-input" class="container-chat-input">
            <div id="chatframe"></div>
        </div>
    </div>
</div>
<script type="module" src="main.ts"></script>
</body></html>
