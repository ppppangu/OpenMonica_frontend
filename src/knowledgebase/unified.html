<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理 - 统一界面</title>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Ant Design Vue CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ant-design-vue@4.x/dist/reset.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
        }

        #app {
            height: 100vh;
            overflow: hidden;
        }

        /* Loading styles */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #64748b;
            font-size: 16px;
        }

        /* Error styles */
        .error-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .error-icon {
            font-size: 64px;
            color: #dc2626;
            margin-bottom: 24px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 24px;
            max-width: 500px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 12px;
        }

        .error-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .error-btn-primary {
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            color: white;
        }

        .error-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }

        .error-btn-secondary {
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }

        .error-btn-secondary:hover {
            background: #e2e8f0;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .error-container {
                padding: 20px;
            }
            
            .error-title {
                font-size: 20px;
            }
            
            .error-message {
                font-size: 14px;
            }
            
            .error-actions {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-container">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载知识库管理系统...</div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="error-container" style="display: none;">
        <div class="error-icon">
            <span class="material-icons" style="font-size: inherit;">error_outline</span>
        </div>
        <h1 class="error-title">加载失败</h1>
        <p class="error-message">
            知识库管理系统加载失败，请检查网络连接或稍后重试。
        </p>
        <div class="error-actions">
            <button class="error-btn error-btn-primary" onclick="window.location.reload()">
                重新加载
            </button>
            <button class="error-btn error-btn-secondary" onclick="window.history.back()">
                返回上页
            </button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app"></div>

    <!-- Scripts -->
    <script>
        // Global error handler
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
            showErrorScreen('JavaScript 执行错误: ' + event.error.message);
        });

        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled promise rejection:', event.reason);
            showErrorScreen('网络请求失败: ' + event.reason);
        });

        function showErrorScreen(message) {
            const loadingScreen = document.getElementById('loading-screen');
            const errorScreen = document.getElementById('error-screen');
            const errorMessage = errorScreen.querySelector('.error-message');
            
            if (loadingScreen) loadingScreen.style.display = 'none';
            if (errorMessage) errorMessage.textContent = message;
            if (errorScreen) errorScreen.style.display = 'flex';
        }

        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.display = 'none';
            }
        }

        // Check if user is logged in
        function checkAuthentication() {
            // This will be handled by the Vue app
            return true;
        }

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuthentication()) {
                showErrorScreen('用户未登录，请先登录后访问知识库管理系统。');
                return;
            }

            // Load the main Vue application
            try {
                import('./unified-main.js').then(() => {
                    hideLoadingScreen();
                }).catch(error => {
                    console.error('Failed to load main application:', error);
                    showErrorScreen('应用程序加载失败，请刷新页面重试。');
                });
            } catch (error) {
                console.error('Failed to import main application:', error);
                showErrorScreen('应用程序初始化失败，请刷新页面重试。');
            }
        });

        // Expose utility functions globally
        window.KnowledgeBaseUtils = {
            showError: showErrorScreen,
            hideLoading: hideLoadingScreen
        };
    </script>
</body>
</html>
