<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>智达AI平台 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="./style.css" rel="stylesheet"/>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- 主容器 -->
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200">
            <!-- Logo和标题 -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="material-icons text-white text-2xl">ZD</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">智达AI平台</h1>
                <p class="text-gray-600 mt-2">欢迎回来，请登录您的账户</p>
            </div>

            <!-- 登录表单 - Vue组件 -->
            <div id="loginform"></div>

            <!-- 注册链接 -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    还没有账户？
                    <a href="signup.html" class="text-purple-600 hover:text-purple-800 font-medium">立即注册</a>
                </p>
            </div>
        </div>

        <!-- 帮助链接 -->
        <div class="mt-6 text-center">
            <p class="text-xs text-gray-500">
                需要帮助？请查看
                <a href="../help/help.html" class="text-purple-600 hover:text-purple-800">帮助文档</a>
                或联系客服
            </p>
        </div>
    </div>

    <script type="module" src="signin-main.ts"></script>

</body>
</html>
