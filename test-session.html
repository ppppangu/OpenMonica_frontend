<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session管理测试</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <style>
        .test-section {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
        }
        .log-area {
            background: #f3f4f6;
            border-radius: 4px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Session管理测试页面</h1>
        
        <!-- 用户信息显示 -->
        <div class="test-section bg-white">
            <h2 class="text-xl font-semibold mb-4">用户信息</h2>
            <div id="userInfo" class="text-sm text-gray-600">
                加载中...
            </div>
        </div>

        <!-- Session信息显示 -->
        <div class="test-section bg-white">
            <h2 class="text-xl font-semibold mb-4">Session信息</h2>
            <div id="sessionInfo" class="text-sm text-gray-600">
                加载中...
            </div>
            <div class="mt-4 space-x-2">
                <button id="initSessionBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                    初始化Session
                </button>
                <button id="refreshSessionBtn" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                    刷新Session列表
                </button>
                <button id="createSessionBtn" class="px-4 py-2 bg-purple-500 text-white rounded hover:bg-purple-600">
                    创建新Session
                </button>
            </div>
        </div>

        <!-- Session列表 -->
        <div class="test-section bg-white">
            <h2 class="text-xl font-semibold mb-4">Session列表</h2>
            <div id="sessionList" class="space-y-2">
                加载中...
            </div>
        </div>

        <!-- 操作日志 -->
        <div class="test-section bg-white">
            <h2 class="text-xl font-semibold mb-4">操作日志</h2>
            <div id="logArea" class="log-area">
                等待操作...
            </div>
            <button id="clearLogBtn" class="mt-2 px-3 py-1 bg-gray-500 text-white rounded text-sm hover:bg-gray-600">
                清空日志
            </button>
        </div>

        <!-- 返回按钮 -->
        <div class="text-center mt-8">
            <a href="index.html" class="px-6 py-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">
                返回主页
            </a>
        </div>
    </div>

    <!-- 引入必要的脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./scripts.js"></script>
    <script src="./public/js/common.js"></script>
    <script src="./public/js/session-manager.js"></script>

    <script>
        // 日志功能
        function addLog(message) {
            const logArea = document.getElementById('logArea');
            const timestamp = new Date().toLocaleTimeString();
            logArea.innerHTML += `[${timestamp}] ${message}\n`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 更新用户信息显示
        function updateUserInfo() {
            const userInfoDiv = document.getElementById('userInfo');
            if (window.globalData && window.globalData.userInfo) {
                const userInfo = window.globalData.userInfo;
                userInfoDiv.innerHTML = `
                    <p><strong>登录状态:</strong> ${userInfo.isLoggedIn ? '已登录' : '未登录'}</p>
                    <p><strong>用户名:</strong> ${userInfo.username || '未设置'}</p>
                    <p><strong>邮箱:</strong> ${userInfo.email || '未设置'}</p>
                    <p><strong>UUID:</strong> ${userInfo.uuid || '未设置'}</p>
                    <p><strong>User ID:</strong> ${window.globalData.user_id || '未设置'}</p>
                `;
            } else {
                userInfoDiv.innerHTML = '<p class="text-red-500">用户信息未加载</p>';
            }
        }

        // 更新Session信息显示
        function updateSessionInfo() {
            const sessionInfoDiv = document.getElementById('sessionInfo');
            if (window.globalData) {
                sessionInfoDiv.innerHTML = `
                    <p><strong>当前Session ID:</strong> ${window.globalData.session_id || '未设置'}</p>
                    <p><strong>Session管理器状态:</strong> ${window.sessionManager ? '已加载' : '未加载'}</p>
                    <p><strong>当前Session (管理器):</strong> ${window.sessionManager ? window.sessionManager.getCurrentSessionId() || '未设置' : '管理器未加载'}</p>
                `;
            } else {
                sessionInfoDiv.innerHTML = '<p class="text-red-500">全局数据未加载</p>';
            }
        }

        // 更新Session列表显示
        async function updateSessionList() {
            const sessionListDiv = document.getElementById('sessionList');
            
            if (!window.globalData || !window.globalData.userInfo || !window.globalData.userInfo.isLoggedIn) {
                sessionListDiv.innerHTML = '<p class="text-yellow-500">用户未登录，无法获取Session列表</p>';
                return;
            }

            try {
                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                if (!userId) {
                    sessionListDiv.innerHTML = '<p class="text-red-500">用户ID不存在</p>';
                    return;
                }

                addLog('正在获取Session列表...');
                const response = await axios.post('/api/user/chat/list', {
                    user_id: userId
                });

                if (response.data && Array.isArray(response.data)) {
                    const sessions = response.data.sort((a, b) => 
                        new Date(b.timestamp) - new Date(a.timestamp)
                    );

                    if (sessions.length === 0) {
                        sessionListDiv.innerHTML = '<p class="text-gray-500">暂无Session记录</p>';
                    } else {
                        sessionListDiv.innerHTML = sessions.map((session, index) => `
                            <div class="p-3 border rounded ${session.session_id === window.globalData.session_id ? 'bg-blue-50 border-blue-200' : 'bg-gray-50'}">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <p class="font-medium">Session ${index + 1}</p>
                                        <p class="text-sm text-gray-600">ID: ${session.session_id}</p>
                                        <p class="text-sm text-gray-600">时间: ${new Date(session.timestamp).toLocaleString()}</p>
                                    </div>
                                    <div class="space-x-2">
                                        <button onclick="switchToSession('${session.session_id}')" 
                                                class="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">
                                            切换
                                        </button>
                                        <button onclick="deleteSession('${session.session_id}')" 
                                                class="px-3 py-1 bg-red-500 text-white rounded text-sm hover:bg-red-600">
                                            删除
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }
                    addLog(`获取到 ${sessions.length} 个Session`);
                } else {
                    sessionListDiv.innerHTML = '<p class="text-red-500">Session列表格式错误</p>';
                    addLog('Session列表格式错误');
                }
            } catch (error) {
                sessionListDiv.innerHTML = '<p class="text-red-500">获取Session列表失败</p>';
                addLog(`获取Session列表失败: ${error.message}`);
            }
        }

        // 切换到指定Session
        async function switchToSession(sessionId) {
            try {
                addLog(`正在切换到Session: ${sessionId}`);
                if (window.sessionManager) {
                    await window.sessionManager.switchToSession(sessionId);
                } else {
                    window.globalData.session_id = sessionId;
                }
                updateSessionInfo();
                updateSessionList();
                addLog(`成功切换到Session: ${sessionId}`);
            } catch (error) {
                addLog(`切换Session失败: ${error.message}`);
            }
        }

        // 删除Session
        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个Session吗？')) {
                return;
            }

            try {
                addLog(`正在删除Session: ${sessionId}`);
                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                const response = await axios.post('/api/user/chat/delete', {
                    user_id: userId,
                    session_id: sessionId
                });
                
                addLog(`Session删除成功: ${sessionId}`);
                updateSessionList();
                
                // 如果删除的是当前Session，重新初始化
                if (sessionId === window.globalData.session_id) {
                    await initializeSession();
                }
            } catch (error) {
                addLog(`删除Session失败: ${error.message}`);
            }
        }

        // 初始化Session
        async function initializeSession() {
            try {
                addLog('正在初始化Session...');
                if (window.sessionManager) {
                    const sessionId = await window.sessionManager.initializeSession();
                    addLog(`Session初始化完成: ${sessionId}`);
                } else {
                    addLog('Session管理器未加载');
                }
                updateSessionInfo();
                updateSessionList();
            } catch (error) {
                addLog(`Session初始化失败: ${error.message}`);
            }
        }

        // 创建新Session
        async function createNewSession() {
            try {
                addLog('正在创建新Session...');
                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                const response = await axios.post('/api/user/chat/create', {
                    user_id: userId
                });
                
                if (response.data && response.data.session_id) {
                    addLog(`新Session创建成功: ${response.data.session_id}`);
                    await switchToSession(response.data.session_id);
                } else {
                    addLog('创建Session响应格式错误');
                }
            } catch (error) {
                addLog(`创建新Session失败: ${error.message}`);
            }
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async () => {
            addLog('页面加载完成');
            
            // 等待全局数据加载
            setTimeout(async () => {
                updateUserInfo();
                updateSessionInfo();
                
                if (window.globalData && window.globalData.userInfo && window.globalData.userInfo.isLoggedIn) {
                    await updateSessionList();
                } else {
                    addLog('用户未登录，请先登录');
                }
            }, 1000);

            // 绑定按钮事件
            document.getElementById('initSessionBtn').addEventListener('click', initializeSession);
            document.getElementById('refreshSessionBtn').addEventListener('click', updateSessionList);
            document.getElementById('createSessionBtn').addEventListener('click', createNewSession);
            document.getElementById('clearLogBtn').addEventListener('click', () => {
                document.getElementById('logArea').innerHTML = '';
            });
        });

        // 暴露函数到全局作用域
        window.switchToSession = switchToSession;
        window.deleteSession = deleteSession;
    </script>
</body>
</html>
