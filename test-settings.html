<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置页面自动保存测试</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
    <style>
        .test-section {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin: 16px 0;
            background: white;
        }
        .log-area {
            background: #f3f4f6;
            border-radius: 4px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-success { background-color: #10b981; }
        .status-warning { background-color: #f59e0b; }
        .status-error { background-color: #ef4444; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">设置页面自动保存功能测试</h1>
        
        <!-- 当前状态 -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">当前状态</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <p class="text-sm text-gray-600 mb-2">用户登录状态</p>
                    <p id="loginStatus" class="font-medium">
                        <span class="status-indicator status-error"></span>检查中...
                    </p>
                </div>
                <div>
                    <p class="text-sm text-gray-600 mb-2">用户ID</p>
                    <p id="userId" class="font-medium text-sm">-</p>
                </div>
                <div>
                    <p class="text-sm text-gray-600 mb-2">API状态</p>
                    <p id="apiStatus" class="font-medium">
                        <span class="status-indicator status-warning"></span>未测试
                    </p>
                </div>
            </div>
        </div>

        <!-- 测试区域 -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">自动保存测试</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 个性化提示词测试 -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-medium">个性化提示词</h3>
                        <div id="promptSaveStatus" class="text-sm text-gray-500">未修改</div>
                    </div>
                    <textarea
                        id="testUserPrompt"
                        class="w-full h-32 p-3 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-purple-500 focus:border-transparent text-sm"
                        placeholder="在这里输入测试内容，停止输入3秒后会自动保存..."
                    ></textarea>
                    <div class="mt-2 space-x-2">
                        <button onclick="loadTestPrompt()" class="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">
                            加载数据
                        </button>
                        <button onclick="clearTestPrompt()" class="px-3 py-1 bg-gray-500 text-white rounded text-sm hover:bg-gray-600">
                            清空
                        </button>
                    </div>
                </div>

                <!-- 个性化记忆测试 -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-medium">个性化记忆</h3>
                        <div id="memorySaveStatus" class="text-sm text-gray-500">未修改</div>
                    </div>
                    <textarea
                        id="testModelMemory"
                        class="w-full h-32 p-3 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                        placeholder="在这里输入测试内容，停止输入3秒后会自动保存..."
                    ></textarea>
                    <div class="mt-2 space-x-2">
                        <button onclick="loadTestMemory()" class="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">
                            加载数据
                        </button>
                        <button onclick="clearTestMemory()" class="px-3 py-1 bg-gray-500 text-white rounded text-sm hover:bg-gray-600">
                            清空
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 手动测试按钮 -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">手动测试</h2>
            <div class="space-x-2">
                <button onclick="testGetPrompt()" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                    测试获取提示词
                </button>
                <button onclick="testGetMemory()" class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">
                    测试获取记忆
                </button>
                <button onclick="testSavePrompt()" class="px-4 py-2 bg-orange-500 text-white rounded hover:bg-orange-600">
                    测试保存提示词
                </button>
                <button onclick="testSaveMemory()" class="px-4 py-2 bg-orange-500 text-white rounded hover:bg-orange-600">
                    测试保存记忆
                </button>
                <button onclick="testApiConnection()" class="px-4 py-2 bg-purple-500 text-white rounded hover:bg-purple-600">
                    测试API连接
                </button>
            </div>
        </div>

        <!-- 实时日志 -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">实时日志</h2>
            <div id="logDisplay" class="log-area">
                等待操作...
            </div>
            <div class="mt-2 space-x-2">
                <button onclick="clearLog()" class="px-3 py-1 bg-gray-500 text-white rounded text-sm hover:bg-gray-600">
                    清空日志
                </button>
                <button onclick="exportLog()" class="px-3 py-1 bg-blue-500 text-white rounded text-sm hover:bg-blue-600">
                    导出日志
                </button>
            </div>
        </div>

        <!-- 返回按钮 -->
        <div class="text-center mt-8">
            <a href="settings.html" class="px-6 py-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 mr-4">
                打开设置页面
            </a>
            <a href="index.html" class="px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
                返回主页
            </a>
        </div>
    </div>

    <!-- 引入必要的脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./scripts.js"></script>
    <script src="./public/js/common.js"></script>
    <script src="./public/js/session-manager.js"></script>

    <script>
        let logBuffer = [];
        let promptTimer = null;
        let memoryTimer = null;

        // 重写console.log来捕获日志
        const originalConsoleLog = console.log;
        const originalConsoleError = console.error;
        
        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            addToLog('LOG', args.join(' '));
        };
        
        console.error = function(...args) {
            originalConsoleError.apply(console, args);
            addToLog('ERROR', args.join(' '));
        };

        function addToLog(level, message) {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] [${level}] ${message}`;
            logBuffer.push(logEntry);
            
            const logDisplay = document.getElementById('logDisplay');
            logDisplay.textContent = logBuffer.join('\n');
            logDisplay.scrollTop = logDisplay.scrollHeight;
        }

        function clearLog() {
            logBuffer = [];
            document.getElementById('logDisplay').textContent = '日志已清空...';
        }

        function exportLog() {
            const logContent = logBuffer.join('\n');
            const blob = new Blob([logContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `settings-test-log-${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function updateStatus() {
            // 更新登录状态
            const loginStatusEl = document.getElementById('loginStatus');
            const userIdEl = document.getElementById('userId');
            
            if (window.globalData && window.globalData.userInfo && window.globalData.userInfo.isLoggedIn) {
                loginStatusEl.innerHTML = '<span class="status-indicator status-success"></span>已登录 (' + window.globalData.userInfo.username + ')';
                userIdEl.textContent = window.globalData.userInfo.uuid || window.globalData.user_id || '未设置';
            } else {
                loginStatusEl.innerHTML = '<span class="status-indicator status-error"></span>未登录';
                userIdEl.textContent = '未登录';
            }
        }

        function showSaveStatus(type, status) {
            const statusEl = document.getElementById(type === 'prompt' ? 'promptSaveStatus' : 'memorySaveStatus');
            if (!statusEl) return;
            
            switch (status) {
                case 'saving':
                    statusEl.innerHTML = '<span class="text-blue-500">💾 保存中...</span>';
                    break;
                case 'success':
                    statusEl.innerHTML = '<span class="text-green-500">✅ 已保存</span>';
                    setTimeout(() => {
                        statusEl.innerHTML = '<span class="text-gray-500">未修改</span>';
                    }, 2000);
                    break;
                case 'error':
                    statusEl.innerHTML = '<span class="text-red-500">❌ 保存失败</span>';
                    setTimeout(() => {
                        statusEl.innerHTML = '<span class="text-gray-500">未修改</span>';
                    }, 3000);
                    break;
            }
        }

        // 自动保存功能
        async function autoSavePrompt(content) {
            try {
                if (!window.globalData?.userInfo?.isLoggedIn) {
                    addToLog('ERROR', '用户未登录，无法保存提示词');
                    return;
                }

                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                showSaveStatus('prompt', 'saving');
                addToLog('INFO', '自动保存提示词...');

                const response = await axios.post('/api/user/prompt/update', {
                    user_id: userId,
                    new_text: content
                });

                if (response.data.success) {
                    showSaveStatus('prompt', 'success');
                    addToLog('SUCCESS', '提示词自动保存成功');
                } else {
                    showSaveStatus('prompt', 'error');
                    addToLog('ERROR', '提示词自动保存失败: ' + response.data.message);
                }
            } catch (error) {
                showSaveStatus('prompt', 'error');
                addToLog('ERROR', '提示词自动保存错误: ' + error.message);
            }
        }

        async function autoSaveMemory(content) {
            try {
                if (!window.globalData?.userInfo?.isLoggedIn) {
                    addToLog('ERROR', '用户未登录，无法保存记忆');
                    return;
                }

                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                showSaveStatus('memory', 'saving');
                addToLog('INFO', '自动保存记忆...');

                const response = await axios.post('/api/user/memory/update', {
                    user_id: userId,
                    new_text: content
                });

                if (response.data.success) {
                    showSaveStatus('memory', 'success');
                    addToLog('SUCCESS', '记忆自动保存成功');
                } else {
                    showSaveStatus('memory', 'error');
                    addToLog('ERROR', '记忆自动保存失败: ' + response.data.message);
                }
            } catch (error) {
                showSaveStatus('memory', 'error');
                addToLog('ERROR', '记忆自动保存错误: ' + error.message);
            }
        }

        // 设置自动保存监听器
        function setupAutoSave() {
            const promptTextarea = document.getElementById('testUserPrompt');
            const memoryTextarea = document.getElementById('testModelMemory');

            if (promptTextarea) {
                promptTextarea.addEventListener('input', function() {
                    if (promptTimer) clearTimeout(promptTimer);
                    promptTimer = setTimeout(() => {
                        autoSavePrompt(this.value);
                    }, 3000);
                });
            }

            if (memoryTextarea) {
                memoryTextarea.addEventListener('input', function() {
                    if (memoryTimer) clearTimeout(memoryTimer);
                    memoryTimer = setTimeout(() => {
                        autoSaveMemory(this.value);
                    }, 3000);
                });
            }
        }

        // 测试函数
        async function testGetPrompt() {
            try {
                if (!window.globalData?.userInfo?.isLoggedIn) {
                    addToLog('ERROR', '用户未登录');
                    return;
                }

                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                addToLog('INFO', '测试获取提示词...');
                
                const response = await axios.post('/api/user/prompt/get', {
                    user_id: userId
                });

                addToLog('SUCCESS', '获取提示词成功: ' + JSON.stringify(response.data));
            } catch (error) {
                addToLog('ERROR', '获取提示词失败: ' + error.message);
            }
        }

        async function testGetMemory() {
            try {
                if (!window.globalData?.userInfo?.isLoggedIn) {
                    addToLog('ERROR', '用户未登录');
                    return;
                }

                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                addToLog('INFO', '测试获取记忆...');
                
                const response = await axios.post('/api/user/memory/get', {
                    user_id: userId
                });

                addToLog('SUCCESS', '获取记忆成功: ' + JSON.stringify(response.data));
            } catch (error) {
                addToLog('ERROR', '获取记忆失败: ' + error.message);
            }
        }

        async function testSavePrompt() {
            const content = document.getElementById('testUserPrompt').value;
            await autoSavePrompt(content);
        }

        async function testSaveMemory() {
            const content = document.getElementById('testModelMemory').value;
            await autoSaveMemory(content);
        }

        async function loadTestPrompt() {
            try {
                if (!window.globalData?.userInfo?.isLoggedIn) {
                    addToLog('ERROR', '用户未登录');
                    return;
                }

                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                const response = await axios.post('/api/user/prompt/get', {
                    user_id: userId
                });

                if (response.data.success) {
                    document.getElementById('testUserPrompt').value = response.data.data || '';
                    addToLog('SUCCESS', '提示词数据加载成功');
                }
            } catch (error) {
                addToLog('ERROR', '加载提示词失败: ' + error.message);
            }
        }

        async function loadTestMemory() {
            try {
                if (!window.globalData?.userInfo?.isLoggedIn) {
                    addToLog('ERROR', '用户未登录');
                    return;
                }

                const userId = window.globalData.userInfo.uuid || window.globalData.user_id;
                const response = await axios.post('/api/user/memory/get', {
                    user_id: userId
                });

                if (response.data.success) {
                    document.getElementById('testModelMemory').value = response.data.data || '';
                    addToLog('SUCCESS', '记忆数据加载成功');
                }
            } catch (error) {
                addToLog('ERROR', '加载记忆失败: ' + error.message);
            }
        }

        function clearTestPrompt() {
            document.getElementById('testUserPrompt').value = '';
            addToLog('INFO', '提示词测试区域已清空');
        }

        function clearTestMemory() {
            document.getElementById('testModelMemory').value = '';
            addToLog('INFO', '记忆测试区域已清空');
        }

        async function testApiConnection() {
            try {
                addToLog('INFO', '测试API连接...');
                const response = await axios.get('/api/config');
                
                const apiStatusEl = document.getElementById('apiStatus');
                if (response.data) {
                    apiStatusEl.innerHTML = '<span class="status-indicator status-success"></span>API正常';
                    addToLog('SUCCESS', 'API连接正常');
                } else {
                    apiStatusEl.innerHTML = '<span class="status-indicator status-error"></span>API异常';
                    addToLog('ERROR', 'API响应异常');
                }
            } catch (error) {
                const apiStatusEl = document.getElementById('apiStatus');
                apiStatusEl.innerHTML = '<span class="status-indicator status-error"></span>连接失败';
                addToLog('ERROR', 'API连接失败: ' + error.message);
            }
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async () => {
            addToLog('INFO', '测试页面加载完成');
            
            // 等待全局数据加载
            setTimeout(() => {
                updateStatus();
                setupAutoSave();
                testApiConnection();
                addToLog('INFO', '测试页面初始化完成');
            }, 1000);
        });

        // 定期更新状态
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
