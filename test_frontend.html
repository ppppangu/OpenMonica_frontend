<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Knowledge Base API Test</h1>
    
    <div class="test-section">
        <h2>1. Test Login</h2>
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>

    <div class="test-section">
        <h2>2. Test Knowledge Base API</h2>
        <button onclick="testKnowledgeBase()">Test Knowledge Base List</button>
        <div id="kbResult"></div>
    </div>

    <div class="test-section">
        <h2>3. Test Direct FormData Request</h2>
        <button onclick="testDirectFormData()">Test Direct FormData</button>
        <div id="directResult"></div>
    </div>

    <script>
        let currentToken = null;
        let currentUserId = null;

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            resultDiv.innerHTML = '<p>Testing login...</p>';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'testpassword'
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    currentToken = result.token;
                    currentUserId = result.user_id;
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Login Successful</h3>
                            <pre>${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Login Failed</h3>
                            <pre>${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Login Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testKnowledgeBase() {
            const resultDiv = document.getElementById('kbResult');
            
            if (!currentToken || !currentUserId) {
                resultDiv.innerHTML = '<div class="error">Please login first!</div>';
                return;
            }

            resultDiv.innerHTML = '<p>Testing knowledge base API...</p>';

            try {
                const formData = new FormData();
                formData.append('user_id', currentUserId);
                formData.append('token', currentToken);

                console.log('Sending request with:', {
                    user_id: currentUserId,
                    token: currentToken.substring(0, 10) + '...'
                });

                const response = await fetch('/user/knowledgebase/get_list', {
                    method: 'POST',
                    body: formData
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                const result = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ Knowledge Base API Response</h3>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Knowledge Base API Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testDirectFormData() {
            const resultDiv = document.getElementById('directResult');
            resultDiv.innerHTML = '<p>Testing direct FormData request...</p>';

            try {
                const formData = new FormData();
                formData.append('user_id', 'test_user_123');
                formData.append('token', 'test_token_123');

                const response = await fetch('/user/knowledgebase/get_list', {
                    method: 'POST',
                    body: formData
                });

                const responseText = await response.text();
                console.log('Raw response:', responseText);

                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    result = { error: 'Failed to parse JSON', raw: responseText };
                }
                
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        <h3>${response.ok ? '✅' : '❌'} Direct FormData Test</h3>
                        <p>Status: ${response.status}</p>
                        <p>Content-Type: ${response.headers.get('content-type')}</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Direct FormData Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
